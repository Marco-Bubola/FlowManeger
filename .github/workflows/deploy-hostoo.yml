name: deploy-hostoo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostoo-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Prepare Laravel writable directories
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p bootstrap/cache

      - name: Install PHP Dependencies (Production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Compute local view hash
        run: |
          echo "LOCAL_CREATE_SALE_SHA=$(sha1sum resources/views/livewire/sales/create-sale.blade.php | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Validate required deploy secrets
        env:
          HOSTOO_HOST: ${{ secrets.HOSTOO_HOST }}
          HOSTOO_USER: ${{ secrets.HOSTOO_USER }}
          HOSTOO_PASSWORD: ${{ secrets.HOSTOO_PASSWORD }}
          HOSTOO_PORT: ${{ secrets.HOSTOO_PORT }}
          HOSTOO_APP_PATH: ${{ secrets.HOSTOO_APP_PATH }}
          HOSTOO_PUBLIC_PATH: ${{ secrets.HOSTOO_PUBLIC_PATH }}
        run: |
          [ -n "$HOSTOO_HOST" ] || (echo "Secret HOSTOO_HOST não definido" && exit 1)
          [ -n "$HOSTOO_USER" ] || (echo "Secret HOSTOO_USER não definido" && exit 1)
          [ -n "$HOSTOO_PASSWORD" ] || (echo "Secret HOSTOO_PASSWORD não definido" && exit 1)
          [ -n "$HOSTOO_PORT" ] || (echo "Secret HOSTOO_PORT não definido" && exit 1)
          [ -n "$HOSTOO_APP_PATH" ] || (echo "Secret HOSTOO_APP_PATH não definido" && exit 1)
          [ -n "$HOSTOO_PUBLIC_PATH" ] || (echo "Secret HOSTOO_PUBLIC_PATH não definido" && exit 1)

      - name: Criar diretórios remotos
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          script_stop: true
          script: |
            # Remove diretórios antigos (cleanup)
            rm -rf "${{ secrets.HOSTOO_APP_PATH }}" || true
            rm -rf "${{ secrets.HOSTOO_PUBLIC_PATH }}" || true
            
            # Cria novos diretórios com permissões adequadas
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}"
            mkdir -p "${{ secrets.HOSTOO_PUBLIC_PATH }}"
            chmod 777 "${{ secrets.HOSTOO_APP_PATH }}"
            chmod 777 "${{ secrets.HOSTOO_PUBLIC_PATH }}"
            
            # Verifica espaço em disco
            df -h "${{ secrets.HOSTOO_APP_PATH }}"
            
            # Verifica permissões
            ls -ld "${{ secrets.HOSTOO_APP_PATH }}"
            ls -ld "${{ secrets.HOSTOO_PUBLIC_PATH }}"

      - name: Upload PHP core files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          source: "app,bootstrap,config,database,routes,scripts,artisan,composer.json,composer.lock,.env.example"
          target: ${{ secrets.HOSTOO_APP_PATH }}
          rm: false
          overwrite: true
          strip_components: 0

      - name: Upload Blade views
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          source: "resources/views"
          target: ${{ secrets.HOSTOO_APP_PATH }}
          rm: false
          overwrite: true
          strip_components: 0

      - name: Upload public files to HOSTOO_PUBLIC_PATH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          source: "public/.htaccess,public/index.php,public/robots.txt,public/assets,public/build,public/storage,public/js"
          target: ${{ secrets.HOSTOO_PUBLIC_PATH }}
          rm: false
          overwrite: true
          strip_components: 1

      - name: Run remote post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_SHA: ${{ github.sha }}
          LOCAL_CREATE_SALE_SHA: ${{ env.LOCAL_CREATE_SALE_SHA }}
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          timeout: 120s
          command_timeout: 10m
          script_stop: true
          envs: GITHUB_SHA,LOCAL_CREATE_SALE_SHA
          script: |
            cd "${{ secrets.HOSTOO_APP_PATH }}"
            
            # Criar diretórios de cache ANTES do composer install
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p bootstrap/cache
            
            # Instala dependências SEM rodar os post-autoload scripts (que tentariam usar artisan)
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts
            
            # Agora sim pode usar php artisan (vendor está pronto)
            php artisan package:discover --ansi || true
            php artisan down --retry=60 || true
            php artisan migrate --force || { php artisan up; exit 1; }
            php artisan storage:link || echo "Storage link already exists"
            php artisan optimize:clear
            php -r "if (function_exists('opcache_reset')) { opcache_reset(); echo 'OPcache reset executado'.PHP_EOL; }"
            php artisan optimize
            REMOTE_CREATE_SALE_SHA="$(sha1sum resources/views/livewire/sales/create-sale.blade.php | awk '{print $1}')"
            echo "Local create-sale SHA:  $LOCAL_CREATE_SALE_SHA"
            echo "Remote create-sale SHA: $REMOTE_CREATE_SALE_SHA"
            [ "$REMOTE_CREATE_SALE_SHA" = "$LOCAL_CREATE_SALE_SHA" ] || {
              echo "ERRO: a view create-sale no servidor nao bate com a versao do commit."
              echo "Provavel caminho remoto incorreto (app_path/document root desalinhados)."
              php artisan up
              exit 1
            }
            printf '%s\n' "$GITHUB_SHA" > "${{ secrets.HOSTOO_PUBLIC_PATH }}/deploy-sha.txt"
            php artisan queue:restart
            php artisan up
            echo "=== Deploy concluído com sucesso ==="
