name: deploy-hostoo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostoo-main
  cancel-in-progress: true


  
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Prepare Laravel writable directories
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p bootstrap/cache

      - name: Install PHP Dependencies (Production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Compute local view hash
        run: |
          echo "LOCAL_CREATE_SALE_SHA=$(sha1sum resources/views/livewire/sales/create-sale.blade.php | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Validate required deploy secrets
        env:
          HOSTOO_HOST: ${{ secrets.HOSTOO_HOST }}
          HOSTOO_USER: ${{ secrets.HOSTOO_USER }}
          HOSTOO_PASSWORD: ${{ secrets.HOSTOO_PASSWORD }}
          HOSTOO_PORT: ${{ secrets.HOSTOO_PORT }}
          HOSTOO_APP_PATH: ${{ secrets.HOSTOO_APP_PATH }}
          HOSTOO_PUBLIC_PATH: ${{ secrets.HOSTOO_PUBLIC_PATH }}
        run: |
          [ -n "$HOSTOO_HOST" ] || (echo "Secret HOSTOO_HOST não definido" && exit 1)
          [ -n "$HOSTOO_USER" ] || (echo "Secret HOSTOO_USER não definido" && exit 1)
          [ -n "$HOSTOO_PASSWORD" ] || (echo "Secret HOSTOO_PASSWORD não definido" && exit 1)
          [ -n "$HOSTOO_PORT" ] || (echo "Secret HOSTOO_PORT não definido" && exit 1)
          [ -n "$HOSTOO_APP_PATH" ] || (echo "Secret HOSTOO_APP_PATH não definido" && exit 1)
          [ -n "$HOSTOO_PUBLIC_PATH" ] || (echo "Secret HOSTOO_PUBLIC_PATH não definido" && exit 1)

      - name: Criar diretórios remotos
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          script_stop: true
          script: |
            # Nao remover APP_PATH/PUBLIC_PATH: isso apaga .env e quebra o deploy.
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}"
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}/public"
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}/database/migrations"
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}/storage/app/public"
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}/storage/framework/cache/data"
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}/storage/framework/sessions"
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}/storage/framework/views"
            mkdir -p "${{ secrets.HOSTOO_APP_PATH }}/storage/logs"
            chmod 777 "${{ secrets.HOSTOO_APP_PATH }}"

            EXPECTED_PUBLIC="${{ secrets.HOSTOO_APP_PATH }}/public"
            CURRENT_PUBLIC="$(readlink -f "${{ secrets.HOSTOO_PUBLIC_PATH }}" 2>/dev/null || echo '')"
            if [ "$CURRENT_PUBLIC" != "$EXPECTED_PUBLIC" ]; then
              rm -rf "${{ secrets.HOSTOO_PUBLIC_PATH }}"
              ln -s "$EXPECTED_PUBLIC" "${{ secrets.HOSTOO_PUBLIC_PATH }}"
              echo "Symlink corrigido: ${{ secrets.HOSTOO_PUBLIC_PATH }} -> $EXPECTED_PUBLIC"
            fi
            
            # Verifica espaço em disco
            df -h "${{ secrets.HOSTOO_APP_PATH }}"
            
            # Verifica permissões
            ls -ld "${{ secrets.HOSTOO_APP_PATH }}"
            ls -ld "${{ secrets.HOSTOO_PUBLIC_PATH }}"

      - name: Upload PHP core files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          source: "app,bootstrap,config,database,routes,scripts,artisan,composer.json,composer.lock,.env.example"
          target: ${{ secrets.HOSTOO_APP_PATH }}
          rm: false
          overwrite: true
          strip_components: 0

      - name: Upload Blade views
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          source: "resources/views"
          target: ${{ secrets.HOSTOO_APP_PATH }}
          rm: false
          overwrite: true
          strip_components: 0

      - name: Upload public files to HOSTOO_PUBLIC_PATH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          source: "public/.htaccess,public/index.php,public/robots.txt,public/assets,public/build,public/storage,public/js"
          target: ${{ secrets.HOSTOO_APP_PATH }}/public
          rm: false
          overwrite: true
          strip_components: 1



      - name: Run remote post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_SHA: ${{ github.sha }}
          LOCAL_CREATE_SALE_SHA: ${{ env.LOCAL_CREATE_SALE_SHA }}
        with:
          host: ${{ secrets.HOSTOO_HOST }}
          username: ${{ secrets.HOSTOO_USER }}
          password: ${{ secrets.HOSTOO_PASSWORD }}
          port: ${{ secrets.HOSTOO_PORT }}
          timeout: 180s
          command_timeout: 30m
          script_stop: true
          envs: GITHUB_SHA,LOCAL_CREATE_SALE_SHA
          script: |
            echo "[deploy] entrando em APP_PATH"
            cd "${{ secrets.HOSTOO_APP_PATH }}"
            [ -f .env ] || { echo "ERRO: arquivo .env nao encontrado em $PWD"; exit 1; }
            mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
            echo "[deploy] composer install"
            composer install --no-dev --no-scripts
            echo "[deploy] package discover"
            php artisan package:discover --ansi || true
            echo "[deploy] limpando cache de configuracao"
            rm -f bootstrap/cache/config.php bootstrap/cache/packages.php bootstrap/cache/services.php || true
            php artisan config:clear || true
            php artisan cache:clear || true
            echo "[deploy] DB_* lidos do .env (senha mascarada)"
            grep -E '^DB_(CONNECTION|HOST|PORT|DATABASE|USERNAME|PASSWORD)=' .env | sed -E 's/^(DB_PASSWORD=).*/\1***MASKED***/'
            DB_CHECK_LOG="${{ secrets.HOSTOO_APP_PATH }}/storage/logs/db-check.log"
            echo "[deploy] testando conexao de banco"
            if ! php artisan migrate:status --no-ansi > "$DB_CHECK_LOG" 2>&1; then
              echo "ERRO: falha de conexao com banco. Revise DB_CONNECTION, DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME e DB_PASSWORD no .env do servidor."
              tail -n 60 "$DB_CHECK_LOG" || true
              exit 1
            fi
            echo "[deploy] aplicando migracoes"
            php artisan down --retry=60 || true
            php artisan migrate --force || { php artisan up; exit 1; }
            php artisan storage:link || echo "Storage link already exists"
            php artisan optimize:clear
            php -r "if (function_exists('opcache_reset')) { opcache_reset(); echo 'OPcache reset'.PHP_EOL; }"
            php artisan optimize
            REMOTE_CREATE_SALE_SHA="$(sha1sum resources/views/livewire/sales/create-sale.blade.php | awk '{print $1}')"
            echo "Local create-sale SHA:  $LOCAL_CREATE_SALE_SHA"
            echo "Remote create-sale SHA: $REMOTE_CREATE_SALE_SHA"
            [ "$REMOTE_CREATE_SALE_SHA" = "$LOCAL_CREATE_SALE_SHA" ] || { echo "ERRO: SHA mismatch"; php artisan up; exit 1; }
            printf '%s\n' "$GITHUB_SHA" > "${{ secrets.HOSTOO_APP_PATH }}/public/deploy-sha.txt"
            php artisan queue:restart
            php artisan up
            echo "=== Deploy OK ==="

            